<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>image2offer demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card upload-card">
        <div class="title-row">
          <h1>image2offer</h1>
          <div class="title-meta">
            <span class="byline">by Giovanni Ventilii</span>
            <a
              class="info-btn"
              href="https://github.com/giovent/image2offer"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Open image2offer repository"
              title="Repository"
            >
              Info
            </a>
          </div>
        </div>
        <p class="subtitle">Upload or paste an offer image and press Enter.</p>
        <button id="load-example-btn" class="load-example-cta" type="button">Run example image</button>

        <label id="drop-zone" class="drop-zone">
          <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
          <span id="drop-label">Drop image here, click to upload, or paste from clipboard</span>
        </label>

        <div class="controls">
          <div class="country-label-wrap">
            <label for="offer-country">Country (optional)</label>
            <span class="tooltip-wrap" tabindex="0" aria-label="Country info">
              <span class="tooltip-icon" aria-hidden="true">i</span>
              <span id="country-help" class="tooltip-text">
                Inserting the country helps the agents with language and barcode search.
              </span>
            </span>
          </div>
          <input
            id="offer-country"
            type="text"
            value=""
            placeholder="Optional (default: unknown)"
            aria-describedby="country-help"
          />
          <button id="run-btn" type="button">Run</button>
        </div>

        <div id="preview-panel" class="preview-panel hidden" aria-live="polite">
          <p class="preview-title">Selected image preview</p>
          <img id="selected-preview" class="selected-preview" alt="Selected upload preview" />
        </div>

        <p id="status-text" class="status-text">Idle</p>
      </section>

      <section class="card trace-card">
        <div class="panel-header">
          <h2>Trace</h2>
          <div id="wip-indicator" class="wip hidden" aria-hidden="true">
            <span class="dot"></span>
            <span>Working</span>
          </div>
        </div>
        <ul id="trace-list" class="trace-list"></ul>
      </section>

      <section class="card result-card">
        <h2>Recent decoded images</h2>
        <div id="recent-results" class="recent-results">
          <p class="empty-history">No processed images yet.</p>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
